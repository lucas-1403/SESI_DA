<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Círculo que Deixa Cópias</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background-color: #121212;
            overflow: hidden;
            cursor: crosshair; /* Muda o cursor para uma cruz para ajudar a mirar */
        }

        /* Estilo da bola principal (que segue o mouse) */
        .circulo-principal {
            width: 30px;
            height: 30px;
            background-color: #00ff88;
            border-radius: 50%;
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 10; /* Garante que a bola principal fique por cima das cópias */
        }

        /* Estilo das cópias que vão ficar paradas */
        .copia {
            width: 30px;
            height: 30px;
            background-color: rgba(0, 255, 136, 0.4); /* Um pouco transparente para efeito visual */
            border: 2px solid #00ff88;
            border-radius: 50%;
            position: absolute;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="circulo-principal" id="bolaPrincipal"></div>

    <script>
        const bolaPrincipal = document.getElementById('bolaPrincipal');
        
        // Variáveis para guardar a posição atual do mouse
        let mouseX = 0;
        let mouseY = 0;

        // 1. Faz a bola principal seguir o mouse
        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;

            bolaPrincipal.style.left = `${mouseX}px`;
            bolaPrincipal.style.top = `${mouseY}px`;
        });

        // 2. Cria uma cópia no lugar quando o mouse for clicado
        document.addEventListener('click', () => {
            // Cria um novo elemento <div> no HTML
            const novaCopia = document.createElement('div');
            
            // Adiciona a classe CSS de cópia para ele ficar estilizado
            novaCopia.classList.add('copia');
            
            // Define a posição da cópia exatamente onde o mouse estava no clique
            novaCopia.style.left = `${mouseX}px`;
            novaCopia.style.top = `${mouseY}px`;
            
            // Coloca a nova cópia dentro da página (body)
            document.body.appendChild(novaCopia);
        });
    </script>

</body>
</html>
